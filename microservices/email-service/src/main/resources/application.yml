spring:
  application:
    name: jeroka-email-service
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS:true}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  datasource:
    url: jdbc:postgresql://${EMAIL_DB_HOST:localhost}:${EMAIL_DB_PORT:5432}/${EMAIL_DB_NAME:jeroka_email}
    username: ${EMAIL_DB_USER:postgres}
    password: ${EMAIL_DB_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${PORT:3003}

api:
  prefix: /api/v1
  jwt:
    secret: ${JWT_SECRET:jeroka-dev-secret-min-32-chars-change-me}
    access-ttl-ms: ${JWT_ACCESS_TTL_MS:900000}
    refresh-ttl-ms: ${JWT_REFRESH_TTL_MS:604800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3001,http://127.0.0.1:3001}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: Content-Type,Authorization,X-Requested-With,X-Internal-Api-Key
    allow-credentials: true

jeroka:
  auth:
    jwks-url: ${JEROKA_AUTH_JWKS_URL:http://localhost:3004/.well-known/jwks.json}
  organization-api:
    base-url: ${JEROKA_ORGANIZATION_API_BASE_URL:http://localhost:3005}
  internal:
    api-key: ${INTERNAL_API_KEY:dev-internal-key}

app:
  google:
    oauth:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3002/api/v1/settings/google/callback}
    mail:
      stub: ${APP_GOOGLE_MAIL_STUB:false}

logging:
  level:
    root: INFO
    fr.jeroka: DEBUG

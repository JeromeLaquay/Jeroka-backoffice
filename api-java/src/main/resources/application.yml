spring:
  application:
    name: jeroka-api-dashboard
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # Virtual threads (Java 21) : meilleure montée en charge, désactiver si souci
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS:true}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jeroka_dashboard}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 10000
      idle-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # Désactiver en dev si checksum mismatch après modification d'une migration (run flyway:repair puis remettre true)
    validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:true}

server:
  port: ${PORT:3002}
  servlet:
    context-path: /
  error:
    include-message: always

api:
  prefix: /api/v1
  jwt:
    # Secret HS256: au moins 32 caractères (256 bits). En prod: JWT_SECRET
    secret: ${JWT_SECRET:jeroka-dev-secret-min-32-chars-change-me}
    access-ttl-ms: ${JWT_ACCESS_TTL_MS:900000}
    refresh-ttl-ms: ${JWT_REFRESH_TTL_MS:604800000}
  cors:
    # 5173 = Vite dev (backoffice), 3001 = build / autre ; 127.0.0.1 pour éviter "Network Error" si ouverture par IP
    allowed-origins: ${CORS_ORIGINS:http://localhost:3001,http://127.0.0.1:3001,http://localhost:5173,http://127.0.0.1:5173,https://backoffice.jerokaxperience.fr}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: Content-Type,Authorization,X-Requested-With
    allow-credentials: true

# Modules api (intégrations externes) — optionnel
app:
  ia:
    provider: ${APP_IA_PROVIDER:claude}
    openai-api-key: ${OPENAI_API_KEY:}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    # Modèle Claude (ex. claude-sonnet-4-6, claude-opus-4-6, claude-haiku-4-5)
    claude-model: ${APP_IA_CLAUDE_MODEL:claude-sonnet-4-6}
  google:
    oauth:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3002/api/v1/settings/google/callback}
    mail:
      # true = stub sans appel Gmail (tests). false ou absent = API Gmail réelle.
      stub: ${APP_GOOGLE_MAIL_STUB:false}
    drive:
      enabled: ${APP_GOOGLE_DRIVE_ENABLED:true}
    calendar:
      enabled: ${APP_GOOGLE_CALENDAR_ENABLED:true}
      calendar-id: ${APP_GOOGLE_CALENDAR_ID:primary}
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  social:
    facebook:
      enabled: ${APP_SOCIAL_FACEBOOK_ENABLED:false}
    linkedin:
      enabled: ${APP_SOCIAL_LINKEDIN_ENABLED:false}
    twitter:
      enabled: ${APP_SOCIAL_TWITTER_ENABLED:false}

logging:
  level:
    root: INFO
    fr.jeroka: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

services:
  # Base de données PostgreSQL pour le développement
  postgres-dev:
    image: postgres:15-alpine
    container_name: jeroka-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: jeroka_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      # Schéma et données gérés par Flyway au démarrage de l'API (db/migration)
    ports:
      - "5432:5432"
    networks:
      - jeroka-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jeroka_dashboard"]
      interval: 30s
      timeout: 60s
      retries: 10
      start_period: 60s

  # API Backend en mode développement
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeroka-api-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3002

      # Database
      DB_HOST: postgres-dev
      DB_PORT: 5432
      DB_NAME: jeroka_dashboard
      DB_USER: postgres
      DB_PASSWORD: postgres

      # JWT (clés de développement)
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      JWT_REFRESH_EXPIRES_IN: 30d

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # CORS
      FRONTEND_URL: http://localhost:3001
      BACKOFFICE_URL: http://localhost:3001
      VITE_API_URL: http://localhost:3002

      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}

      # Google OAuth (définir dans .env en dev)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: http://localhost:3002/api/v1/settings/google/callback

      # Upload
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760

      # Rate Limiting (plus permissif en dev)
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 10000

      # Logs
      LOG_LEVEL: debug

      # Puppeteer
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      # Timeouts
      AI_REQUEST_TIMEOUT: 300000
      AI_IMAGE_TIMEOUT: 300000
      SERVER_TIMEOUT: 300000

    volumes:
      # - .:/app  # ← Commenter cette ligne
      - /app/node_modules
      - uploads_dev_data:/app/uploads
      - logs_dev_data:/app/logs
    ports:
      - "3002:3002"
    networks:
      - jeroka-dev-network
    depends_on:
      postgres-dev:
        condition: service_healthy
    # command: npm run start
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 120s

  # Flyway repair : à lancer après modification d'une migration déjà appliquée (checksum mismatch).
  # Utilise la même base que api-dev (postgres-dev).
  # Commande : docker compose --profile repair run --rm flyway-repair
  flyway-repair:
    image: flyway/flyway:10
    container_name: jeroka-flyway-repair
    networks:
      - jeroka-dev-network
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres-dev:5432/jeroka_dashboard
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    volumes:
      - ./src/main/resources/db/migration:/flyway/sql
    command: repair
    depends_on:
      postgres-dev:
        condition: service_healthy
    profiles:
      - repair

  # Adminer pour le développement
  adminer-dev:
    image: adminer:4.8.1
    container_name: jeroka-adminer-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - jeroka-dev-network
    depends_on:
      - postgres-dev
    environment:
      ADMINER_DEFAULT_SERVER: postgres-dev
      ADMINER_DESIGN: dracula
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  jeroka-dev-network:
    external: true
    name: jeroka-dev-network

volumes:
  postgres_dev_data:
    name: jeroka-postgres-dev-data
  uploads_dev_data:
    name: jeroka-uploads-dev-data
  logs_dev_data:
    name: jeroka-logs-dev-data